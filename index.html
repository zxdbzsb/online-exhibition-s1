<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>在線，但不在身邊｜Scroll 展覽</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: "Noto Sans TC", sans-serif;
  background: black;
  color: white;
  overflow-x: hidden;
}

/* 每一個全螢幕場景 */
.section {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;

  padding: 40px;
  opacity: 0;
  transform: translateY(60px);
  transition: all 1.2s ease;
}

.section.show {
  opacity: 1;
  transform: translateY(0);
}

/* 標題 */
h1 {
  font-size: clamp(32px, 5vw, 64px);
  margin-bottom: 20px;
  letter-spacing: 2px;
}

p {
  font-size: 18px;
  opacity: 0.7;
  max-width: 600px;
  line-height: 1.8;
}

/* 背景層次 */
.section:nth-child(odd) {
  background: radial-gradient(circle at center, #111, #000);
}

/* 按鈕 */
button {
  margin-top: 20px;
  padding: 12px 24px;
  border: none;
  border-radius: 30px;
  background: white;
  color: black;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

/* 語錄 */
.quote {
  margin-top: 20px;
  font-size: 16px;
  opacity: 0.8;
}
</style>
</head>

<body>

<!-- Scene 1 -->
<div class="section">
  <h1>你在線</h1>
  <p>每天滑手機、回訊息、更新限動<br>但你真的在這裡嗎？</p>
</div>

<!-- Scene 2 -->
<div class="section">
  <h1>你被看見</h1>
  <p>限動 30 人看過<br>但沒有人真正問你還好嗎</p>
</div>

<!-- Scene 3 -->
<div class="section">
  <h1>你被分類</h1>
  <p id="tag">#安靜 #已讀不回 #看起來很好</p>
</div>

<!-- Scene 4 -->
<div class="section">
  <h1>你消失</h1>
  <p>訊息很多，但你不想回<br>你只是一直在線</p>

  <button onclick="generateQuote()">產生一句孤單語錄</button>
  <div class="quote" id="quote">點擊看看今天的你</div>
</div>

<!-- Scene 5 -->
<div class="section">
  <h1>回到自己</h1>
  <p>或許孤單不是問題<br>只是你太習慣不被理解</p>
</div>

<script>
const sections = document.querySelectorAll('.section');

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('show');
    }
  });
}, { threshold: 0.4 });

sections.forEach(sec => observer.observe(sec));

const quotes = [
  "我在線，但沒人真正找我。",
  "已讀不回，是最安靜的拒絕。",
  "我很好，只是不想說話。",
  "人很多，但我還是孤單。",
  "滑了一整晚，沒有一句話留下。",
  "我不是消失，我只是沒被注意。"
];

function generateQuote() {
  const random = Math.floor(Math.random() * quotes.length);
  document.getElementById("quote").innerText = quotes[random];
}
</script>

</body>
</html>
